<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mama's Munches — Mockup Review (Homepage + Product Page)</title>
<!--
  Mama's Munches — Phase 3 Design Mockup
  Built to brief v1.0 (2026-04-30)
  Updated 2026-04-30: replaced Unsplash placeholders with real wp-media-library/ photos.
  Doctype + UTF-8 meta added to fix mojibake (Â£ â€" â†') rendering.
-->
<style>
  /* ============================================
     DESIGN TOKENS
     ============================================ */
  :root {
    /* Palette — per brief §2 */
    --primary: #E68A95;
    --primary-dark: #C56A7A;
    --surface-pink: #F5C2C8;
    --surface-cream: #FBF3DC;
    --surface-alt: #FFF9F0;
    --accent: #F5D050;
    --accent-dark: #7A6500;
    --text: #3A2E26;
    --text-muted: #6B5C50;
    --text-inverse: #FFFAF5;
    --cookie-brown: #8B6F4E;
    --success: #2E7D4F;
    --border-subtle: #E8D5C0;
    
    /* Typography */
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    color: var(--text);
    background: #2a2a2a;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================
     CONTROL BAR — viewport + page switcher
     ============================================ */
  .control-bar {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #1a1a1a;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #333;
  }

  .control-group {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .control-label {
    font-size: 12px;
    font-weight: 500;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 8px;
  }

  .control-btn {
    background: #333;
    color: #fff;
    border: 1px solid #444;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .control-btn:hover { background: #444; }
  .control-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  /* ============================================
     VIEWPORT FRAME
     ============================================ */
  .viewport-stage {
    padding: 24px;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }

  .viewport-frame {
    background: var(--surface-cream);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: width 0.3s ease;
    min-height: 100vh;
    overflow: hidden;
  }

  .viewport-frame.vw-375 { width: 375px; }
  .viewport-frame.vw-768 { width: 768px; }
  .viewport-frame.vw-1440 { width: 1440px; }

  /* All design styling scoped to .mm so viewport changes work cleanly */
  .mm {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface-cream);
  }

  .mm h1, .mm h2, .mm h3 {
    font-family: var(--font-display);
    color: var(--text);
    line-height: 1.15;
  }

  .mm a { color: inherit; text-decoration: none; }
  .mm img { max-width: 100%; display: block; }
  .mm button { font-family: var(--font-body); cursor: pointer; }

  /* ============================================
     HEADER / NAV
     ============================================ */
  .mm-header {
    background: var(--surface-cream);
    border-bottom: 1px solid var(--border-subtle);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .mm-logo {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--primary-dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mm-logo::before {
    content: '';
    width: 36px;
    height: 36px;
    background: var(--primary);
    border-radius: 50%;
    display: inline-block;
    position: relative;
    flex-shrink: 0;
  }

  .mm-nav {
    display: none;
    gap: 28px;
    align-items: center;
  }

  .mm-nav a {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    transition: color 0.15s;
  }

  .mm-nav a:hover { color: var(--primary-dark); }

  .mm-nav .nav-special {
    color: var(--primary-dark);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .mm-nav .nav-special::after {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .mm-header-icons {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .icon-btn {
    background: none;
    border: none;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    position: relative;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .icon-btn:hover { background: var(--border-subtle); }

  .cart-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--primary);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Show desktop nav on viewports 768+ */
  .vw-768 .mm-nav,
  .vw-1440 .mm-nav { display: flex; }
  .vw-768 .icon-hamburger,
  .vw-1440 .icon-hamburger { display: none; }
  .vw-1440 .mm-nav { gap: 32px; }

  /* On 768 we trim the nav slightly */
  .vw-768 .mm-nav { font-size: 14px; gap: 20px; }

  /* ============================================
     HERO
     ============================================ */
  .hero {
    position: relative;
    overflow: hidden;
  }

  /* Mobile: stacked, full-bleed image with copy overlay below */
  .hero-image-wrap {
    position: relative;
    height: 380px;
    overflow: hidden;
    background: var(--surface-pink);
  }

  .hero-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hero-image-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(58,46,38,0) 40%, rgba(58,46,38,0.35) 100%);
  }

  .hero-content {
    padding: 32px 24px 48px;
    background: var(--surface-pink);
  }

  .hero h1 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .hero-subhead {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .hero-cta-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Tablet+ : two column */
  .vw-768 .hero,
  .vw-1440 .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: stretch;
    background: var(--surface-pink);
  }

  .vw-768 .hero-content,
  .vw-1440 .hero-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 48px;
  }

  .vw-1440 .hero-content {
    padding: 96px 80px;
  }

  .vw-768 .hero-image-wrap,
  .vw-1440 .hero-image-wrap {
    height: auto;
    min-height: 540px;
  }

  .vw-1440 .hero-image-wrap {
    min-height: 640px;
  }

  .vw-768 .hero h1 { font-size: 44px; }
  .vw-1440 .hero h1 { font-size: 56px; }

  .vw-768 .hero-subhead,
  .vw-1440 .hero-subhead { font-size: 18px; max-width: 480px; }

  .vw-768 .hero-cta-group,
  .vw-1440 .hero-cta-group { flex-direction: row; }

  /* ============================================
     BUTTONS
     ============================================ */
  .btn {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 16px;
    padding: 14px 28px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    min-height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--primary-dark);
    color: var(--text-inverse);
  }
  .btn-primary:hover { background: #a85567; }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border-color: var(--text);
  }
  .btn-secondary:hover { background: var(--text); color: var(--text-inverse); }

  .btn-block { width: 100%; }

  /* ============================================
     TRUST BAR
     ============================================ */
  .trust-bar {
    background: var(--surface-pink);
    padding: 32px 24px;
    border-top: 1px solid rgba(58,46,38,0.08);
  }

  .trust-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .trust-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }

  .trust-icon {
    width: 44px;
    height: 44px;
    background: var(--text-inverse);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-dark);
    flex-shrink: 0;
  }

  .trust-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .vw-768 .trust-grid,
  .vw-1440 .trust-grid {
    grid-template-columns: repeat(4, 1fr);
  }

  .vw-1440 .trust-item { flex-direction: row; text-align: left; }
  .vw-1440 .trust-label { font-size: 15px; }

  /* ============================================
     SECTION BASICS
     ============================================ */
  .section {
    padding: 56px 24px;
  }

  .vw-768 .section { padding: 72px 48px; }
  .vw-1440 .section { padding: 96px 80px; }

  .section-alt { background: var(--surface-alt); }
  .section-pink { background: var(--surface-pink); }

  .section-header {
    text-align: center;
    margin-bottom: 40px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }

  .section-header h2 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .section-header p {
    color: var(--text-muted);
    font-size: 16px;
  }

  .vw-768 .section-header h2 { font-size: 36px; }
  .vw-1440 .section-header h2 { font-size: 40px; }
  .vw-1440 .section-header p { font-size: 18px; }

  .label-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    color: var(--primary-dark);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
  }

  /* ============================================
     FEATURED PRODUCT
     ============================================ */
  .product-feature {
    display: grid;
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .vw-768 .product-feature,
  .vw-1440 .product-feature {
    grid-template-columns: 2fr 1fr;
    gap: 32px;
  }

  .product-card {
    background: var(--text-inverse);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .product-card-image {
    aspect-ratio: 4/3;
    overflow: hidden;
    background: var(--surface-pink);
  }

  .product-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .product-card-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .vw-1440 .product-card-body { padding: 32px; }

  .product-card h3 {
    font-size: 24px;
    font-weight: 600;
  }

  .vw-1440 .product-card h3 { font-size: 28px; }

  .product-card p { color: var(--text-muted); font-size: 15px; }

  .pack-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pack-pill {
    background: transparent;
    border: 1.5px solid var(--border-subtle);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }

  .pack-pill.active,
  .pack-pill:hover {
    background: var(--primary-dark);
    color: var(--text-inverse);
    border-color: var(--primary-dark);
  }

  .price-display {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .price-display .price-main {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
  }

  .price-display .price-meta {
    font-size: 13px;
    color: var(--text-muted);
  }

  .save-badge {
    display: inline-block;
    background: var(--accent);
    color: var(--accent-dark);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .product-trial {
    background: var(--surface-pink);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
    justify-content: center;
  }

  .product-trial h3 {
    font-size: 22px;
    font-weight: 600;
  }

  .product-trial-price {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 600;
  }

  /* ============================================
     BRAND STORY
     ============================================ */
  .story {
    display: grid;
    gap: 32px;
    max-width: 1200px;
    margin: 0 auto;
    align-items: center;
  }

  .vw-768 .story,
  .vw-1440 .story {
    grid-template-columns: 1fr 1fr;
    gap: 56px;
  }

  .story-image {
    aspect-ratio: 4/5;
    overflow: hidden;
    border-radius: 16px;
    background: var(--surface-pink);
    order: -1;
  }

  .vw-768 .story-image,
  .vw-1440 .story-image { order: 0; }

  .story-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .story-text h2 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .vw-1440 .story-text h2 { font-size: 40px; }

  .story-text p {
    margin-bottom: 16px;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
  }

  .vw-1440 .story-text p { font-size: 18px; }

  .story-attribution {
    font-family: var(--font-display);
    font-style: italic;
    color: var(--primary-dark);
    font-weight: 500;
    margin-top: 24px;
  }

  /* ============================================
     INGREDIENT GRID
     ============================================ */
  .ing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .vw-768 .ing-grid,
  .vw-1440 .ing-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  .ing-card {
    background: var(--text-inverse);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
  }

  .ing-icon {
    width: 56px;
    height: 56px;
    background: var(--surface-pink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: var(--primary-dark);
  }

  .ing-card h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .ing-card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .ing-card .ing-note {
    color: var(--accent-dark);
    font-style: italic;
    margin-top: 8px;
    font-size: 12px;
  }

  .ing-footnote {
    max-width: 720px;
    margin: 32px auto 0;
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    font-style: italic;
  }

  /* ============================================
     GIFT SECTION
     ============================================ */
  .gift-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .vw-768 .gift-grid,
  .vw-1440 .gift-grid {
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }

  .gift-card {
    background: var(--text-inverse);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
  }

  .gift-card-image {
    aspect-ratio: 16/10;
    background: var(--surface-pink);
    overflow: hidden;
  }

  .gift-card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .gift-card-body {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .gift-card h3 { font-size: 22px; font-weight: 600; }

  .gift-card .price-main {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    margin-top: 8px;
  }

  .gift-card-body p { color: var(--text-muted); font-size: 15px; flex: 1; }

  .send-to-ward {
    text-align: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border-subtle);
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .send-to-ward a {
    color: var(--primary-dark);
    font-weight: 600;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 2px;
  }

  /* ============================================
     SOCIAL PROOF
     ============================================ */
  .trustpilot-placeholder {
    background: var(--text-inverse);
    border: 1px dashed var(--border-subtle);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin: 0 auto 32px;
    max-width: 720px;
    color: var(--text-muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .trustpilot-stars {
    display: inline-flex;
    gap: 2px;
    color: var(--accent);
  }

  .testimonials-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .vw-768 .testimonials-grid,
  .vw-1440 .testimonials-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .vw-1440 .testimonials-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .testimonial {
    background: var(--text-inverse);
    border-radius: 16px;
    padding: 28px 24px;
    border: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .testimonial-stars {
    color: var(--accent);
    font-size: 18px;
    letter-spacing: 2px;
  }

  .testimonial-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
  }

  .testimonial-author {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
  }

  .testimonial-author-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface-pink);
    flex-shrink: 0;
    overflow: hidden;
  }

  .testimonial-author-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .testimonial-author-name {
    font-weight: 600;
    font-size: 14px;
  }

  .testimonial-author-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .insta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 40px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .vw-768 .insta-grid,
  .vw-1440 .insta-grid {
    grid-template-columns: repeat(6, 1fr);
  }

  .insta-tile {
    aspect-ratio: 1;
    background: var(--surface-pink);
    border-radius: 8px;
    overflow: hidden;
  }

  .insta-tile img { width: 100%; height: 100%; object-fit: cover; }

  /* ============================================
     FOOTER
     ============================================ */
  .footer {
    background: var(--text);
    color: var(--text-inverse);
    padding: 48px 24px 32px;
  }

  .vw-768 .footer { padding: 64px 48px 32px; }
  .vw-1440 .footer { padding: 80px 80px 40px; }

  .footer-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 32px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .vw-768 .footer-grid,
  .vw-1440 .footer-grid {
    grid-template-columns: 2fr 1fr 1fr;

/* ============================================
   STATE + RENDERING
   ============================================ */
const state = {
  page: 'home',
  vw: 1440,
  product: {
    pack: '8',
    price: 10,
    flavour: 'Classic Oat',
    topping: 'Choc Chip',
    dietary: 'Regular'
  }
};

function render() {
  const content = document.getElementById('page-content');
  content.className = 'mm page-' + state.page;
  content.innerHTML = state.page === 'home' ? homepageHTML : productPageHTML;

  if (state.page === 'product') {
    bindProductPage();
  }
}

function setViewport(vw) {
  state.vw = vw;
  const frame = document.getElementById('frame');
  frame.className = 'viewport-frame vw-' + vw;
  document.querySelectorAll('[data-vw]').forEach(b => {
    b.classList.toggle('active', b.dataset.vw == vw);
  });
}

function setPage(page) {
  state.page = page;
  document.querySelectorAll('[data-page]').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  render();
  // Scroll to top of viewport
  document.querySelector('.viewport-stage').scrollTop = 0;
}

/* ============================================
   PRODUCT PAGE INTERACTIONS
   ============================================ */
function bindProductPage() {
  // Gallery thumbs
  document.querySelectorAll('.pp-thumb').forEach(thumb => {
    thumb.addEventListener('click', () => {
      document.querySelectorAll('.pp-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
      document.getElementById('pp-main-img').src = thumb.dataset.img;
    });
  });

  // Selector pills
  document.querySelectorAll('.pp-pills').forEach(group => {
    const groupName = group.dataset.group;
    group.querySelectorAll('.pp-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        if (pill.classList.contains('disabled')) return;
        group.querySelectorAll('.pp-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');

        const value = pill.dataset.value;

        if (groupName === 'pack') {
          state.product.pack = value;
          state.product.price = parseFloat(pill.dataset.price);
          document.getElementById('val-pack').textContent = value + '-pack';
        } else if (groupName === 'flavour') {
          state.product.flavour = value;
          document.getElementById('val-flavour').textContent = value;
        } else if (groupName === 'topping') {
          state.product.topping = value;
          document.getElementById('val-topping').textContent = value;
        } else if (groupName === 'dietary') {
          state.product.dietary = value;
          document.getElementById('val-dietary').textContent = value;
          // Vegan disables dairy toppings
          const toppingPills = document.querySelectorAll('[data-group="topping"] .pp-pill');
          toppingPills.forEach(tp => {
            if (tp.dataset.dairy === 'true') {
              if (value === 'Vegan') {
                tp.classList.add('disabled');
                if (tp.classList.contains('active')) {
                  tp.classList.remove('active');
                  // Auto-select "Choc Chip"
                  const fallback = document.querySelector('[data-group="topping"] [data-value="Choc Chip"]');
                  if (fallback) {
                    fallback.classList.add('active');
                    state.product.topping = 'Choc Chip';
                    document.getElementById('val-topping').textContent = 'Choc Chip';
                  }
                }
              } else {
                tp.classList.remove('disabled');
              }
            }
          });
        }

        updatePrice();
      });
    });
  });
}

function updatePrice() {
  const price = state.product.price.toFixed(2);
  const perCookie = (state.product.price / parseInt(state.product.pack)).toFixed(2);
  document.getElementById('pp-price').textContent = '£' + price;
  document.getElementById('pp-per').textContent = '£' + perCookie + ' per cookie';
  document.getElementById('pp-cta').textContent = 'Add to cart — £' + price;
}

/* ============================================
   CONTROL BAR LISTENERS
   ============================================ */
document.querySelectorAll('[data-vw]').forEach(btn => {
  btn.addEventListener('click', () => setViewport(btn.dataset.vw));
});

document.querySelectorAll('[data-page]').forEach(btn => {
  btn.addEventListener('click', () => setPage(btn.dataset.page));
});

// Initial render
render();
</script>
