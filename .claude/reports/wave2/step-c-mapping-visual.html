<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step C — Layout Mapping</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* True neutral dark — zero purple tint */
    --bg:        #0d0f12;
    --surface:   #161920;
    --surface2:  #1e2128;
    --border:    #2a2e38;
    --border2:   #353a47;

    /* Text — high contrast */
    --text:      #f0f2f7;
    --text2:     #b8bfd0;
    --muted:     #6b7591;

    /* Status — distinct, saturated, no purple overlap */
    --green:     #34d399;
    --green-bg:  #06160f;
    --green-bd:  #0d3d24;

    --amber:     #fbbf24;
    --amber-bg:  #140d00;
    --amber-bd:  #3d2c00;

    --sky:       #38bdf8;   /* sky blue — clearly NOT purple */
    --sky-bg:    #03111c;
    --sky-bd:    #083654;

    --rose:      #fb7185;
    --rose-bg:   #160407;
    --rose-bd:   #4a0c14;

    /* Accent for UI chrome only (not data) */
    --accent:    #6366f1;
    --accent-dim: #3730a3;

    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 0;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    gap: 24px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .title-block .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  .status-legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-left: auto;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ─── Stats strip ─── */
  .stats-strip {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .stat-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    min-width: 140px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

  .stat-card.active {
    box-shadow: 0 0 0 2px currentColor, 0 8px 24px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }

  .stat-card.f-all   { background: var(--surface2); border-color: var(--border2); color: var(--text); }
  .stat-card.f-all::before { background: var(--border2); }
  .stat-card.f-all.active { box-shadow: 0 0 0 2px var(--border2), 0 8px 24px rgba(0,0,0,0.4); }

  .stat-card.f-covered { background: var(--green-bg);  border-color: var(--green-bd);  color: var(--green); }
  .stat-card.f-covered::before { background: var(--green); }

  .stat-card.f-db   { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber); }
  .stat-card.f-db::before { background: var(--amber); }

  .stat-card.f-rule { background: var(--sky-bg);   border-color: var(--sky-bd);   color: var(--sky); }
  .stat-card.f-rule::before { background: var(--sky); }

  .stat-card.f-block { background: var(--rose-bg);  border-color: var(--rose-bd);  color: var(--rose); }
  .stat-card.f-block::before { background: var(--rose); }

  .stat-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }

  .stat-content .count {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }

  .stat-content .label {
    font-size: 11px;
    font-weight: 500;
    opacity: 0.75;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── Draft tabs ─── */
  .tabs-row {
    display: flex;
    gap: 0;
  }

  .tab-btn {
    padding: 11px 22px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.1px;
  }

  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: #fff; border-bottom-color: var(--accent); }

  /* ─── Main ─── */
  .main {
    padding: 24px 32px;
    max-width: 1440px;
  }

  /* ─── Big finding banner ─── */
  .banner {
    background: #120b00;
    border: 1px solid var(--amber-bd);
    border-left: 4px solid var(--amber);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 13px;
    color: #fde68a;
    line-height: 1.65;
  }

  .banner strong { color: var(--amber); font-weight: 700; }
  .banner .t-sky { color: var(--sky); font-weight: 600; }
  .banner .t-rose { color: var(--rose); font-weight: 600; }

  /* ─── Progress bar ─── */
  .progress-wrap {
    margin-bottom: 22px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .progress-bar {
    height: 10px;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    gap: 1px;
  }

  .progress-bar .seg { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .progress-bar .seg.covered { background: var(--green); }
  .progress-bar .seg.db      { background: var(--amber); }
  .progress-bar .seg.rule    { background: var(--sky); }
  .progress-bar .seg.block   { background: var(--rose); }

  /* ─── Toolbar ─── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-family: var(--font);
  }

  .btn:hover { background: var(--border); color: var(--text); }

  .active-filter-label {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-left: 4px;
  }

  .toolbar-spacer { flex: 1; }

  /* ─── Sections ─── */
  .sections-list { display: flex; flex-direction: column; gap: 10px; }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .section-card:hover { border-color: var(--border2); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    cursor: pointer;
    user-select: none;
  }

  .chevron {
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
    transition: transform 0.2s ease;
    width: 16px;
    text-align: center;
  }

  .section-card.open .chevron { transform: rotate(90deg); }

  .section-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex: 1;
    white-space: nowrap;
  }

  .section-bem {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 5px;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .section-target-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    background: #1e2638;
    border: 1px solid #2e3f5c;
    padding: 3px 10px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .mini-counts {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .mc {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 5px;
  }

  .mc.green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-bd); }
  .mc.amber  { background: var(--amber-bg);  color: var(--amber);  border: 1px solid var(--amber-bd); }
  .mc.sky    { background: var(--sky-bg);    color: var(--sky);    border: 1px solid var(--sky-bd); }
  .mc.rose   { background: var(--rose-bg);   color: var(--rose);   border: 1px solid var(--rose-bd); }

  /* ─── Section body / table ─── */
  .section-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .section-card.open .section-body { display: block; }

  .rows-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .rows-table colgroup col:nth-child(1) { width: 22%; }
  .rows-table colgroup col:nth-child(2) { width: 22%; }
  .rows-table colgroup col:nth-child(3) { width: 22%; }
  .rows-table colgroup col:nth-child(4) { width: 34%; }

  .rows-table th {
    padding: 9px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .rows-table td {
    padding: 11px 14px;
    border-bottom: 1px solid #171a21;
    vertical-align: top;
  }

  .rows-table tr:last-child td { border-bottom: none; }

  .rows-table tbody tr:hover td { background: rgba(255,255,255,0.025); }

  .rows-table tr.row-hidden { display: none; }

  /* Cell content */
  .cell-el {
    font-family: var(--mono);
    font-size: 12px;
    color: #c8cfe0;
    line-height: 1.5;
    word-break: break-all;
  }

  .cell-target {
    font-family: var(--mono);
    font-size: 12px;
    color: #9ecbf7;
    line-height: 1.5;
    word-break: break-all;
  }

  .cell-note {
    font-size: 12.5px;
    color: var(--text2);
    line-height: 1.55;
  }

  /* Badges */
  .badges-cell {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: flex-start;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .badge.covered { background: var(--green-bg); color: var(--green); border-color: var(--green-bd); }
  .badge.db      { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-bd); }
  .badge.rule    { background: var(--sky-bg);   color: var(--sky);   border-color: var(--sky-bd); }
  .badge.block   { background: var(--rose-bg);  color: var(--rose);  border-color: var(--rose-bd); }

  .rule-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .rule-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--sky);
    background: var(--sky-bg);
    border: 1px solid var(--sky-bd);
    padding: 1px 6px;
    border-radius: 4px;
  }

  /* ─── Summary card ─── */
  .summary-card {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .summary-card h3 {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 18px;
    letter-spacing: -0.3px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .sblock {
    padding: 16px;
    border-radius: 10px;
    border: 1px solid;
  }

  .sblock.covered { background: var(--green-bg);  border-color: var(--green-bd); }
  .sblock.db      { background: var(--amber-bg);  border-color: var(--amber-bd); }
  .sblock.rule    { background: var(--sky-bg);    border-color: var(--sky-bd); }
  .sblock.block   { background: var(--rose-bg);   border-color: var(--rose-bd); }

  .sblock h4 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.1px;
  }

  .sblock.covered h4 { color: var(--green); }
  .sblock.db h4      { color: var(--amber); }
  .sblock.rule h4    { color: var(--sky); }
  .sblock.block h4   { color: var(--rose); }

  .sblock ul { list-style: none; }

  .sblock ul li {
    font-size: 12.5px;
    color: var(--text2);
    padding: 3px 0 3px 14px;
    position: relative;
    line-height: 1.5;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .sblock ul li:last-child { border-bottom: none; }

  .sblock ul li::before {
    content: '›';
    position: absolute;
    left: 2px;
    font-weight: 700;
    font-size: 13px;
  }

  .sblock.covered ul li::before { color: var(--green); }
  .sblock.db ul li::before      { color: var(--amber); }
  .sblock.rule ul li::before    { color: var(--sky); }
  .sblock.block ul li::before   { color: var(--rose); }

  .sblock ul li strong { color: #fff; font-weight: 600; }

  /* ─── Empty state ─── */
  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>

const ALL_MAP = { 1: DRAFT1, 2: DRAFT2 };

/* ─────────────────────────────────────
   STATE
───────────────────────────────────── */
const state = {
  filter: 'all',
  draft: 1,
  open: new Set([...DRAFT1, ...DRAFT2].map(s => s.id)),
};

/* ─────────────────────────────────────
   HELPERS
───────────────────────────────────── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function currentSections() {
  return state.draft === 0 ? [...DRAFT1, ...DRAFT2] : (ALL_MAP[state.draft] || []);
}

function countAll(sections) {
  const c = { covered:0, db:0, rule:0, block:0, total:0 };
  sections.forEach(s => s.rows.forEach(r => {
    c.total++;
    new Set(r.s).forEach(k => { if (c[k]!==undefined) c[k]++; });
  }));
  return c;
}

function rowVisible(row) {
  return state.filter === 'all' || row.s.includes(state.filter);
}

/* ─────────────────────────────────────
   BADGE RENDERERS
───────────────────────────────────── */
function badge(type) {
  const d = STATUS[type];
  return `<span class="badge ${d.cls}">${d.icon} ${d.label}</span>`;
}

function miniCount(color, icon, n) {
  if (!n) return '';
  return `<span class="mc ${color}">${icon} ${n}</span>`;
}

/* ─────────────────────────────────────
   RENDER FUNCTIONS
───────────────────────────────────── */
function renderHeader() {
  const allSecs = [...DRAFT1, ...DRAFT2];
  const c = countAll(allSecs);
  const t = c.total || 1;

  const statCards = [
    { key:'all',     cls:'f-all',     icon:'◉',  count:c.total,   label:'All Rows' },
    { key:'covered', cls:'f-covered', icon:'✅', count:c.covered, label:'Covered' },
    { key:'db',      cls:'f-db',      icon:'➕', count:c.db,      label:'DB Gap' },
    { key:'rule',    cls:'f-rule',    icon:'⚙',  count:c.rule,    label:'Rule Needed' },
    { key:'block',   cls:'f-block',   icon:'🧱', count:c.block,   label:'Block Gap' },
  ].map(s => `
    <div class="stat-card ${s.cls} ${state.filter===s.key?'active':''}" onclick="setFilter('${s.key}')">
      <span class="stat-icon">${s.icon}</span>
      <div class="stat-content">
        <div class="count">${s.count}</div>
        <div class="label">${s.label}</div>
      </div>
    </div>`).join('');

  const tabs = [
    {id:1, label:'🏠 Homepage (Draft 1)'},
    {id:2, label:'🛍 Product Page (Draft 2)'},
    {id:0, label:'📋 Both'},
  ].map(t => `<button class="tab-btn ${state.draft===t.id?'active':''}" onclick="setDraft(${t.id})">${t.label}</button>`).join('');

  const pct = k => Math.round((c[k]/t)*100);

  return `
    <div class="header">
      <div class="header-top">
        <div class="title-block">
          <h1>Step C — Draft → SGS Clone Mapping</h1>
          <div class="subtitle">Layout + responsive CSS line-by-line · both drafts · header/footer excluded · DB-grounded 2026-06-10</div>
        </div>
        <div class="status-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div> Covered</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> DB Gap</div>
          <div class="legend-item"><div class="legend-dot" style="background:#38bdf8"></div> Rule Needed</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fb7185"></div> Block Gap</div>
        </div>
      </div>

      <div class="stats-strip">${statCards}</div>

      <div style="height:10px;background:#1e2128;border-radius:6px;overflow:hidden;display:flex;gap:1px;margin:0 0 20px">
        <div style="height:100%;background:#34d399;border-radius:3px;width:${pct('covered')}%;transition:width .5s"></div>
        <div style="height:100%;background:#fbbf24;width:${pct('db')}%;transition:width .5s"></div>
        <div style="height:100%;background:#38bdf8;width:${pct('rule')}%;transition:width .5s"></div>
        <div style="height:100%;background:#fb7185;width:${pct('block')}%;transition:width .5s"></div>
      </div>

      <div class="tabs-row">${tabs}</div>
    </div>`;
}

function renderSection(sec) {
  const counts = {covered:0,db:0,rule:0,block:0};
  sec.rows.forEach(r => r.s.forEach(k => { if(counts[k]!==undefined) counts[k]++; }));
  const visibleRows = sec.rows.filter(rowVisible);
  if (!visibleRows.length && state.filter !== 'all') return '';

  const isOpen = state.open.has(sec.id);

  const rowsHtml = sec.rows.map(row => {
    const show = rowVisible(row);
    const badges = row.s.map(badge).join('');
    const ruleTags = row.r ? `<div class="rule-tags">${row.r.map(x=>`<span class="rule-tag">${x}</span>`).join('')}</div>` : '';
    return `<tr class="${!show?'row-hidden':''}">
      <td><div class="cell-el">${esc(row.el)}</div></td>
      <td><div class="cell-target">${esc(row.target)}</div></td>
      <td>
        <div class="badges-cell">
          <div style="display:flex;flex-wrap:wrap;gap:4px">${badges}</div>
          ${ruleTags}
        </div>
      </td>
      <td><div class="cell-note">${esc(row.note)}</div></td>
    </tr>`;
  }).join('');

  return `
    <div class="section-card ${isOpen?'open':''}" data-id="${sec.id}">
      <div class="section-header" onclick="toggleSec('${sec.id}')">
        <span class="chevron">▶</span>
        <span class="section-name">${esc(sec.name)}</span>
        <span class="section-bem">${esc(sec.bem)}</span>
        <span class="section-target-badge">${esc(sec.target)}</span>
        <div class="mini-counts">
          ${miniCount('green','✅',counts.covered)}
          ${miniCount('amber','➕',counts.db)}
          ${miniCount('sky','⚙',counts.rule)}
          ${miniCount('rose','🧱',counts.block)}
        </div>
      </div>
      <div class="section-body">
        <table class="rows-table">
          <colgroup><col><col><col><col></colgroup>
          <thead>
            <tr>
              <th>Element / CSS</th>
              <th>SGS Target</th>
              <th>Status</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
    </div>`;
}

        </div>
        <div class="sblock block">
          <h4>🧱 Block completeness (6 blocks — 4 substantially closed in session-21 block-quality programme: product-card / notice-banner / testimonial / option-picker)</h4>
          <ul>
            <li><strong>sgs/info-box</strong> — <s>heading typography, borderRadius, padding, textAlign</s> ✅ FALSE (native supports + selectors target __heading); remaining: description typography + mediaEmojiSize</li>
            <li><strong>sgs/testimonial</strong> — <s>quote/name/role typography (size+colour), card border/radius/padding</s> ✅ DONE (D8, S21); remaining: quoteStyle/LineHeight</li>
            <li><strong>sgs/notice-banner</strong> — <s>background, border, border-radius, padding</s> ✅ DONE (E9, S21); remaining: fontStyle</li>
            <li><strong>sgs/product-card</strong> — <s>card border/radius/background/gradient</s> ✅ DONE (A1+B6, S21); remaining: heading/price typography</li>
            <li><strong>sgs/option-picker</strong> — label font-size+colour ✅ DONE (C7, S21); remaining: label weight/margin, pill typography, pillBorderRadius</li>
            <li><strong>sgs/announcement-bar</strong> — border/radius/padding/layout (inline use)</li>
          </ul>
        </div>
      </div>
    </div>`;
}

function render() {
  const sections = currentSections();
  const sectionsHtml = sections.map(renderSection).filter(Boolean).join('');
  const filterLabel = state.filter !== 'all'
    ? `<span class="active-filter-label">Showing: ${STATUS[state.filter].icon} ${STATUS[state.filter].label} only — <a href="#" onclick="setFilter('all');return false" style="color:var(--sky)">show all</a></span>`
    : '';

  document.getElementById('app').innerHTML = `
    ${renderHeader()}
    <div class="main">
      <div class="banner">
        <strong>Big finding from the CSS pass:</strong> Structural routing is sound. The CSS pass exposed a second, larger gap class —
        <strong>built-in-element blocks lack per-element typography/visual attrs</strong> needed to carry the draft's CSS.
        Work splits cleanly:
        <span class="t-sky">⚙ converter rules (G1–G9)</span> +
        <span style="color:var(--amber);font-weight:600">➕ DB data (aliases/suffixes/tokens)</span> +
        <span class="t-rose">🧱 block-completeness (add missing per-element attrs)</span>.
        All three are additive — none is a rearchitecture.<br><br><strong style="color:var(--rose)">UPDATE 2026-06-11 (session-21 block-quality programme, D206):</strong> the 🧱 visual gaps are now largely closed — product-card / notice-banner / testimonial have border/background/radius/padding (container-mirror + :where overridable); testimonial gained per-element typography (quote/name/role size+colour) via the 7-variant rebuild; option-picker label gained size+colour (C7). Remaining 🧱: per-element <em>heading/price</em> typography (product-card, info-box), pill typography + pillBorderRadius (option-picker), fontStyle/lineHeight/weight tails, and announcement-bar. The ⚙ converter routing (G1–G9) + ➕ DB aliases are unchanged (cloning thread).<br><br><strong style="color:var(--amber)">UPDATE 2026-06-11 PM (DB fact-check + Spec 30, D208):</strong> a row-by-row DB/block.json verification flipped ~19 more labels — native WP supports (border/background/spacing/textAlign), existing attrs (trust-bar icon*, button minHeight, media maxHeight) and existing aliases (price slot, author/name) covered them. The product-page draft is a <strong>WooCommerce page type</strong> (Spec 30): its gallery/buybox/price/CTA/reviews rows map to WC core blocks + FR-30-2/7/8/10 — NOT new aliases; allergen-*/ingr-* terms are content-generic and never enter framework vocab. Genuine survivors: ~24 rows (product-card/option-picker/announcement-bar/trustpilot per-element attrs + a handful of true aliases + order/objectFit suffix work).
      </div>

      <div class="toolbar">
        <button class="btn" onclick="expandAll()">Expand all</button>
        <button class="btn" onclick="collapseAll()">Collapse all</button>
        <div class="toolbar-spacer"></div>
        ${filterLabel}
      </div>

      <div class="sections-list">
        ${sectionsHtml || '<div class="empty-state">No rows match this filter.</div>'}
      </div>

      ${renderSummary()}
    </div>`;
}

/* ─────────────────────────────────────
   INTERACTIONS
───────────────────────────────────── */
function toggleSec(id) {
  state.open.has(id) ? state.open.delete(id) : state.open.add(id);
  render();
}

function setFilter(f) { state.filter = f; render(); }
function setDraft(d)  { state.draft = d;  render(); }
function expandAll()  { currentSections().forEach(s => state.open.add(s.id)); render(); }
function collapseAll(){ currentSections().forEach(s => state.open.delete(s.id)); render(); }

render();
</script>
</body>
</html>
