<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mega panel — depth stack v2 (boutique hospitality)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   MEGA PANEL — DEPTH STACK v2  ·  boutique hospitality

   Fixed from v1:
     · LAG          -> v1 animated `filter` and `box-shadow` on five large
                       images. Both force repaint every frame and are the
                       single most expensive things you can transition.
                       v2 animates ONLY transform + opacity (compositor-only),
                       and the lift-shadow is a pre-rendered pseudo-element
                       whose OPACITY fades rather than a shadow that redraws.
     · HARD TO CLICK-> cards overlapped by ~55%, so the top card ate its
                       neighbour's hit area. Spacing is now 168px against a
                       184px card: they kiss at the edges, every centre is
                       clear, and the hovered card raises z-index anyway.
     · MOBILE BROKE -> the absolute-positioned fan had no honest mobile
                       layout. It is now a proper scroll-snap row.
     · GREYSCALE    -> every card is full colour at rest, as asked. The
                       scrim (not desaturation) is what protects the label.

   NEW: the panel BACKGROUND becomes the room you are hovering — a slow
   Ken Burns pan (scale + drift) so it reads as a video shot without being
   a video. Zero bytes of video, no autoplay, no bandwidth cost beyond the
   images already present. Cross-fades via :has(); falls back to the first
   scene with no :has() support and freezes entirely under reduced-motion.
   ========================================================================== */
:root {
  --primary: #1F3D34;
  --primary-dark: #14261F;
  --accent: #D4AE33;
  --surface: #FBF7EF;
  --text: #14140F;
  --text-inverse: #FBF7EF;

  --font-display: "Fraunces", Georgia, serif;
  --font-body: "Inter", system-ui, sans-serif;

  --space-xs: 8px;
  --space-sm: 14px;
  --space-md: 22px;
  --space-lg: 34px;
  --space-xl: 56px;

  --spring: cubic-bezier(0.34, 1.4, 0.5, 1);
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
}

.sgs-mega-stack {
  --mx: 70%;
  --my: 40%;
  position: relative;
  isolation: isolate;
  background: var(--primary);
  color: var(--text-inverse);
  font-family: var(--font-body);
  padding: var(--space-xl) var(--space-md);
  border-top: 2px solid color-mix(in srgb, var(--accent) 90%, transparent);
  overflow: hidden;
}

/* ---- THE SCENES: one per room, cross-fading behind everything ---------- */
.sgs-mega-stack__scenes {
  position: absolute;
  inset: 0;
  z-index: -3;
  pointer-events: none;
}

.sgs-stack-scene {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 620ms ease;
  overflow: hidden;
}

.sgs-stack-scene img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transform-origin: center;
}

/* The pan. Slow, large-scale, alternating — it never snaps back, which is
   what makes it read as footage rather than a loop. */
@media (prefers-reduced-motion: no-preference) {
  .sgs-stack-scene img {
    animation: sgs-kenburns 26s var(--ease) infinite alternate;
  }
}

@keyframes sgs-kenburns {
  from { transform: scale(1.06) translate3d(-1.5%, -1%, 0); }
  to   { transform: scale(1.16) translate3d(1.5%, 1%, 0); }
}

/* A wash over the scenes: keeps the brand ground dominant and guarantees
   every foreground contrast ratio regardless of which photo is showing. */
.sgs-mega-stack__scenes::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      760px circle at var(--mx) var(--my),
      color-mix(in srgb, var(--accent) 12%, transparent) 0%,
      transparent 62%
    ),
    color-mix(in srgb, var(--primary-dark) 92%, transparent);
}

/* First scene shows by default and whenever nothing is hovered. */
#sgs-s1 { opacity: 1; }

.sgs-mega-stack__inner {
  position: relative;
  max-width: var(--content-width);
  --content-width: 1240px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.15fr;
  gap: var(--space-xl);
  align-items: center;
}

/* ---- LEFT: the anchor -------------------------------------------------- */
.sgs-mega-stack__eyebrow {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: var(--space-sm);
}

.sgs-mega-stack__title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 50px;
  line-height: 1.02;
  letter-spacing: -0.02em;
  color: var(--text-inverse);
  text-wrap: balance;
  margin: 0 0 var(--space-sm);
}

.sgs-mega-stack__title em { font-style: italic; color: var(--accent); }

.sgs-mega-stack__description {
  font-size: 15px;
  line-height: 1.65;
  color: color-mix(in srgb, var(--text-inverse) 84%, transparent);
  max-width: 38ch;
  text-wrap: pretty;
  margin: 0 0 var(--space-lg);
}

.sgs-mega-stack__cta {
  --pull-x: 0px;
  --pull-y: 0px;
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 16px 28px;
  background: var(--accent);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  min-height: 44px;
  border-radius: 2px;
  transform: translate3d(var(--pull-x), var(--pull-y), 0);
  transition: transform 260ms var(--spring);
  will-change: transform;
}

.sgs-mega-stack__cta::after { content: "→"; transition: transform 260ms var(--spring); }
.sgs-mega-stack__cta:hover::after { transform: translateX(4px); }
.sgs-mega-stack__cta:focus-visible { outline: 3px solid var(--surface); outline-offset: 4px; }

/* ---- RIGHT: the deck --------------------------------------------------- */
.sgs-mega-stack__cards {
  position: relative;
  height: 330px;
  perspective: 1300px;
}

.sgs-mega-stack__card {
  position: absolute;
  top: 0;
  left: 50%;
  width: 184px;
  height: 296px;
  margin-left: -92px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: var(--space-sm);
  border: 2px solid color-mix(in srgb, var(--accent) 90%, transparent);
  border-radius: 3px;
  overflow: hidden;
  text-decoration: none;
  color: var(--text-inverse);
  background: var(--primary-dark);
  isolation: isolate;
  /* transform + opacity only — both compositor-only, no repaint */
  transition: transform 420ms var(--spring);
  will-change: transform;
}

/* Cards KISS at the edges rather than stacking on top of each other, so
   every card has a clear, clickable centre. */
.sgs-mega-stack__card:nth-child(1) { transform: translate3d(-336px,14px,0) rotate(-7deg); z-index: 1; }
.sgs-mega-stack__card:nth-child(2) { transform: translate3d(-168px,4px,0)  rotate(-3.5deg); z-index: 2; }
.sgs-mega-stack__card:nth-child(3) { transform: translate3d(0,0,0)         rotate(0deg);    z-index: 3; }
.sgs-mega-stack__card:nth-child(4) { transform: translate3d(168px,4px,0)   rotate(3.5deg);  z-index: 2; }
.sgs-mega-stack__card:nth-child(5) { transform: translate3d(336px,14px,0)  rotate(7deg);    z-index: 1; }

.sgs-mega-stack__image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  z-index: -2;
  /* full colour at rest — no filter to animate, which is the lag fix */
  transition: transform 620ms var(--ease);
  will-change: transform;
}

.sgs-mega-stack__card::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(
    to top,
    color-mix(in srgb, var(--primary-dark) 94%, transparent) 0%,
    color-mix(in srgb, var(--primary-dark) 66%, transparent) 55%,
    color-mix(in srgb, var(--primary-dark) 30%, transparent) 100%
  );
}

/* The lift shadow is a PRE-RENDERED layer whose opacity fades in.
   Transitioning box-shadow itself repaints every frame — this does not. */
.sgs-mega-stack__card::after {
  content: "";
  position: absolute;
  inset: -2px;
  z-index: -3;
  border-radius: 3px;
  box-shadow: 0 26px 48px -20px rgba(0, 0, 0, 0.8);
  opacity: 0;
  transition: opacity 340ms ease;
  pointer-events: none;
}

.sgs-mega-stack__tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}

.sgs-mega-stack__label {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 20px;
  line-height: 1.1;
  color: var(--text-inverse);
}

@media (prefers-reduced-motion: no-preference) {
  .sgs-mega-stack__card:hover,
  .sgs-mega-stack__card:focus-visible {
    z-index: 6;
    transform: translate3d(var(--fx), -22px, 0) rotate(0deg) rotateY(6deg) scale(1.07);
  }
  .sgs-mega-stack__card:nth-child(1) { --fx: -336px; }
  .sgs-mega-stack__card:nth-child(2) { --fx: -168px; }
  .sgs-mega-stack__card:nth-child(3) { --fx: 0px; }
  .sgs-mega-stack__card:nth-child(4) { --fx: 168px; }
  .sgs-mega-stack__card:nth-child(5) { --fx: 336px; }

  .sgs-mega-stack__card:hover .sgs-mega-stack__image,
  .sgs-mega-stack__card:focus-visible .sgs-mega-stack__image { transform: scale(1.09); }
}

.sgs-mega-stack__card:hover::after,
.sgs-mega-stack__card:focus-visible::after { opacity: 1; }
.sgs-mega-stack__card:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

/* ---- SCENE SWITCHING — pure CSS ---------------------------------------- */
.sgs-mega-stack:has(#sgs-c1:hover) #sgs-s1,
.sgs-mega-stack:has(#sgs-c1:focus-visible) #sgs-s1,
.sgs-mega-stack:has(#sgs-c2:hover) #sgs-s2,
.sgs-mega-stack:has(#sgs-c2:focus-visible) #sgs-s2,
.sgs-mega-stack:has(#sgs-c3:hover) #sgs-s3,
.sgs-mega-stack:has(#sgs-c3:focus-visible) #sgs-s3,
.sgs-mega-stack:has(#sgs-c4:hover) #sgs-s4,
.sgs-mega-stack:has(#sgs-c4:focus-visible) #sgs-s4,
.sgs-mega-stack:has(#sgs-c5:hover) #sgs-s5,
.sgs-mega-stack:has(#sgs-c5:focus-visible) #sgs-s5 { opacity: 1; }

.sgs-mega-stack:has(#sgs-c2:hover) #sgs-s1,
.sgs-mega-stack:has(#sgs-c3:hover) #sgs-s1,
.sgs-mega-stack:has(#sgs-c4:hover) #sgs-s1,
.sgs-mega-stack:has(#sgs-c5:hover) #sgs-s1,
.sgs-mega-stack:has(#sgs-c2:focus-visible) #sgs-s1,
.sgs-mega-stack:has(#sgs-c3:focus-visible) #sgs-s1,
.sgs-mega-stack:has(#sgs-c4:focus-visible) #sgs-s1,
.sgs-mega-stack:has(#sgs-c5:focus-visible) #sgs-s1 { opacity: 0; }

@media (max-width: 1240px) {
  .sgs-mega-stack__card:nth-child(1) { transform: translate3d(-272px,14px,0) rotate(-7deg); }
  .sgs-mega-stack__card:nth-child(2) { transform: translate3d(-136px,4px,0)  rotate(-3.5deg); }
  .sgs-mega-stack__card:nth-child(4) { transform: translate3d(136px,4px,0)   rotate(3.5deg); }
  .sgs-mega-stack__card:nth-child(5) { transform: translate3d(272px,14px,0)  rotate(7deg); }
  .sgs-mega-stack__card:nth-child(1) { --fx: -272px; }
  .sgs-mega-stack__card:nth-child(2) { --fx: -136px; }
  .sgs-mega-stack__card:nth-child(4) { --fx: 136px; }
  .sgs-mega-stack__card:nth-child(5) { --fx: 272px; }
}

@media (max-width: 1023px) {
  .sgs-mega-stack__inner { grid-template-columns: 1fr; gap: var(--space-lg); }
  .sgs-mega-stack__title { font-size: 38px; }
}

/* ---- MOBILE: an honest scroll-snap row, not a broken fan --------------- */
@media (max-width: 1023px) {
  .sgs-mega-stack__cards {
    height: auto;
    perspective: none;
    display: flex;
    gap: var(--space-sm);
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 4px 4px var(--space-sm);
    margin: 0 calc(var(--space-md) * -1);
    padding-inline: var(--space-md);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .sgs-mega-stack__cards::-webkit-scrollbar { display: none; }
  .sgs-mega-stack__card {
    position: relative;
    top: auto; left: auto; margin-left: 0;
    flex: 0 0 172px;
    height: 248px;
    scroll-snap-align: start;
    transform: none !important;
    will-change: auto;
  }
  .sgs-mega-stack__card::after { display: none; }
}

@media (max-width: 767px) {
  .sgs-mega-stack { padding: var(--space-lg) var(--space-md); }
  .sgs-mega-stack__title { font-size: 32px; }
  .sgs-mega-stack__card { flex-basis: 158px; height: 228px; }
}

@media (prefers-reduced-motion: reduce) {
  .sgs-stack-scene img { animation: none; transform: scale(1.06); }
  .sgs-mega-stack__card,
  .sgs-mega-stack__image,
  .sgs-mega-stack__cta,
  .sgs-mega-stack__card::after { transition: none; }
  .sgs-mega-stack__cta { transform: none !important; }
  .sgs-mega-stack__cards {
    height: auto; perspective: none;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--space-xs);
  }
  .sgs-mega-stack__card {
    position: relative; top: auto; left: auto; margin-left: 0;
    width: auto; height: 250px; transform: none !important;
  }
}
</style>
</head>
<body>

<section class="sgs-mega-stack" id="sgs-stack">

  <div class="sgs-mega-stack__scenes" aria-hidden="true">
    <div class="sgs-stack-scene" id="sgs-s1"><img src="https://picsum.photos/id/1048/1600/900" alt="" width="1600" height="900"></div>
    <div class="sgs-stack-scene" id="sgs-s2"><img src="https://picsum.photos/id/1031/1600/900" alt="" width="1600" height="900"></div>
    <div class="sgs-stack-scene" id="sgs-s3"><img src="https://picsum.photos/id/1040/1600/900" alt="" width="1600" height="900"></div>
    <div class="sgs-stack-scene" id="sgs-s4"><img src="https://picsum.photos/id/1029/1600/900" alt="" width="1600" height="900"></div>
    <div class="sgs-stack-scene" id="sgs-s5"><img src="https://picsum.photos/id/1015/1600/900" alt="" width="1600" height="900"></div>
  </div>

  <div class="sgs-mega-stack__inner">

    <div class="sgs-mega-stack__body">
      <span class="sgs-mega-stack__eyebrow">The rooms</span>
      <h3 class="sgs-mega-stack__title">Eleven rooms,<br>no two <em>alike</em></h3>
      <p class="sgs-mega-stack__description">Each one shaped by the building rather than a floor plan. Pick the one that suits the trip, or let us choose for you.</p>
      <a class="sgs-mega-stack__cta" href="#" id="sgs-stack-cta">Check availability</a>
    </div>

    <div class="sgs-mega-stack__cards">
      <a class="sgs-mega-stack__card" id="sgs-c1" href="#">
        <img class="sgs-mega-stack__image" src="https://picsum.photos/id/1048/420/620" alt="" width="420" height="620">
        <span class="sgs-mega-stack__tag">From £140</span>
        <span class="sgs-mega-stack__label">The Attic</span>
      </a>
      <a class="sgs-mega-stack__card" id="sgs-c2" href="#">
        <img class="sgs-mega-stack__image" src="https://picsum.photos/id/1031/420/620" alt="" width="420" height="620">
        <span class="sgs-mega-stack__tag">From £165</span>
        <span class="sgs-mega-stack__label">Garden Rooms</span>
      </a>
      <a class="sgs-mega-stack__card" id="sgs-c3" href="#">
        <img class="sgs-mega-stack__image" src="https://picsum.photos/id/1040/420/620" alt="" width="420" height="620">
        <span class="sgs-mega-stack__tag">From £210</span>
        <span class="sgs-mega-stack__label">The Long Room</span>
      </a>
      <a class="sgs-mega-stack__card" id="sgs-c4" href="#">
        <img class="sgs-mega-stack__image" src="https://picsum.photos/id/1029/420/620" alt="" width="420" height="620">
        <span class="sgs-mega-stack__tag">From £185</span>
        <span class="sgs-mega-stack__label">Courtyard</span>
      </a>
      <a class="sgs-mega-stack__card" id="sgs-c5" href="#">
        <img class="sgs-mega-stack__image" src="https://picsum.photos/id/1015/420/620" alt="" width="420" height="620">
        <span class="sgs-mega-stack__tag">From £260</span>
        <span class="sgs-mega-stack__label">The Suite</span>
      </a>
    </div>

  </div>
</section>

<script>
/* Cursor spotlight + magnetic CTA. Custom properties only, rAF-throttled,
   skipped entirely under reduced-motion. Neither is required to use the panel. */
(function () {
  var el = document.getElementById('sgs-stack');
  var cta = document.getElementById('sgs-stack-cta');
  if (!el || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var frame = 0;
  el.addEventListener('mousemove', function (e) {
    if (frame) return;
    frame = requestAnimationFrame(function () {
      var r = el.getBoundingClientRect();
      el.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
      el.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
      if (cta) {
        var c = cta.getBoundingClientRect();
        var dx = e.clientX - (c.left + c.width / 2);
        var dy = e.clientY - (c.top + c.height / 2);
        var near = Math.abs(dx) < 170 && Math.abs(dy) < 115;
        cta.style.setProperty('--pull-x', (near ? Math.max(-8, Math.min(8, dx * 0.14)) : 0) + 'px');
        cta.style.setProperty('--pull-y', (near ? Math.max(-8, Math.min(8, dy * 0.14)) : 0) + 'px');
      }
      frame = 0;
    });
  });
  el.addEventListener('mouseleave', function () {
    if (cta) { cta.style.setProperty('--pull-x', '0px'); cta.style.setProperty('--pull-y', '0px'); }
  });
})();
</script>

</body>
