# THREAD-SELECTION GATE (read FIRST — added 2026-06-06, doc-council findings #4/MF-3):
# TWO co-active threads share `main`. Before reading anything else:
#   0a. Run ground truth: `git log -1 --stat` + `git status` + `git branch --show-current`
#       + `grep -oE 'D[0-9]+' .claude/decisions.md | sort -V | tail -1` (the D-ceiling).
#   0b. Determine your THREAD from the task / Bean's request:
#       - CLONING-PIPELINE (converter, /sgs-clone, pixel-diff, blocks-as-clone-output)
#         → follow `cold_start_reading_order` below.
#       - SGS-THEME (Spec 27/28 shop layer, blocks, theme.json, configurator, WooCommerce)
#         → follow `cold_start_reading_order_theme`.
#   If genuinely ambiguous, ASK Bean which thread before reading a thread-specific prompt.
#   state.md (item 1 of either order) is now a LEAN per-thread pointer — read only YOUR block.

cold_start_reading_order:   # CLONING-PIPELINE thread
  - 1. .claude/state.md (read the CLONING block + the GROUND-TRUTH-FIRST block)
  - 2. .claude/handoff.md
  - 3. .claude/next-session-prompt.md
  - 4. .claude/specs/22-UNIVERSAL-BLOCK-EQUIVALENT-EXTRACTION.md (canonical pipeline spec — read §0 Purpose + §2 architecture diagram + §3 FRs + §16 ratification gate)
  - 5. .claude/plans/2026-06-09-clone-fix-build-plan.md (LIVE canonical cloning plan — phase-plan) + .claude/plans/2026-06-09-clone-fix-sign-off-ledger.md (55-issue tracker). Superseded re-cuts archived at plans/archive/ (2026-06-03-cloning-fidelity-triage / 2026-06-02-container-wrapper-standardisation / 2026-05-28-phase-2-hybrid-block-migration).
  - 6. .claude/cloning-pipeline-flow.md (pipeline work) OR .claude/architecture.md (other)
  - 7. .claude/decisions.md (last 5-10 entries; D90/D91/D92 = this-session Phase 1.5 close + Phase 2 reorder + R-22-14; D78-D83 = Spec 22 ratification chain)
  - 8. .claude/parking.md (last 5 entries)
  - 9. Domain reference: cloning-pipeline-flow.md (absorbed tooling-map + skills-commands-map + db-tables-map). Spec 22 is the canonical cloning-pipeline spec.
  - 10. .claude/specs/common-wp-styling-errors.md (sections A-R catalogue — check BEFORE filing new "I've seen this" tickets)
  - 11. pipeline-state/<latest-run>/leftover-buckets.json (MANDATORY before any converter-quality conjecture — see feedback_read_leftover_buckets_before_conjecturing.md)

