# Project credentials — discoverable so EVERY session knows they exist + can use
# them directly, without asking Bean. Gitignored; never committed; never walked.
project_credentials:
  - path: .claude/secrets/sandybrown.env
    what: "Staging/canary (sandybrown-nightingale-600381.hostingersite.com) logins — ALWAYS available."
    keys: "WP_USER_SANDYBROWN + WP_PWD_SANDYBROWN (browser/admin login); WP_APP_PWD_SANDYBROWN (REST + WC Store-API Basic auth); WP_URL_SANDYBROWN."
    use_for: "Playwright editor login; REST block-renderer / wp/v2 / wc/store verification. Read directly: grep KEY .claude/secrets/sandybrown.env"
  - path: .claude/secrets/credentials.yml
    what: "General project credentials (YAML)."
    loader: "import yaml; yaml.safe_load(open('.claude/secrets/credentials.yml'))"
  - path: A:/.openclaw/.secrets/wp-app-passwords.env
    what: "Cloning dev-site (palestine-lives.org) WP app passwords."

# Doc-walk scan folders — /handoff Gate 4.5 enumerates *.md (+ *.yaml) DIRECTLY in
# each folder (NON-recursive — archive/strategy subfolders excluded) and surfaces
# any file NOT in canonical_docs as "untracked" — INFORMATIONAL only, never blocking.
# Archived docs (plans/archive/, specs/archive/) are deliberately out of scope and
# must never be re-registered (Bean 2026-07-02).
doc_walk_scan_folders:
  - {path: .claude/,       recursive: false, note: "base .claude files only — NOT subfolders"}
  - {path: .claude/specs/, recursive: false, note: "exclude specs/archive/"}
  - {path: .claude/plans/, recursive: false, note: "exclude plans/archive/ + plans/strategy/"}

# Pipeline run artefacts — the orchestrator writes these per-run; the diagnostic
# surface for converter / clone output. ALWAYS read leftover-buckets.json FIRST
# before conjecturing about pixel-diff / clone-quality causes.
pipeline_run_artefacts:
  base_path: "pipeline-state/<client>-<page>-<YYYY-MM-DD-HHMMSS>/"
  read_first: leftover-buckets.json
  artefacts:
    - {filename: leftover-buckets.json, owns: "Stage 9 gap classification — every converter miss bucketed (section, slot, reason). ALWAYS read FIRST.", writer: plugins/sgs-blocks/scripts/recogniser/leftover-bucket-router.py}
    - {filename: stage-9.json,          owns: "Stage 9 summary — coverage stats, autonomy_chain status, unmatched_sections, operator_review_html_path."}
    - {filename: extract.json,          owns: "Stage 4 full extraction — block_markup + per-section extracted_attributes + variation_css + slot resolution."}
    - {filename: extract.patched.json,  owns: "Stage 10 — block_markup with image URLs swapped to live WP media URLs; used by upload_and_patch.py to PATCH the target page. Spec: Spec 31 §13 (Stage 10 inline-CSS deploy).", writer: plugins/sgs-blocks/scripts/orchestrator/upload_and_patch.py}
    - {filename: trace.jsonl,           owns: "Per-stage trace events incl. new-engine + softfails."}
    - {filename: summary.log,           owns: "Stage 9c — one line per stage with event/error/warning counts. ALWAYS written.", writer: plugins/sgs-blocks/scripts/orchestrator/surface_pipeline_logs.py}
    - {filename: errors.log,            owns: "Stage 9c — trace events with passed=false. Only when >=1 error."}
    - {filename: warnings.log,          owns: "Stage 9c — soft-fails / BEM-lint / token-lint / wp-blocks soft-fails. Only when >=1 warning."}
    - {filename: operator-review.html,  owns: "Human-readable Stage 9 gap surface."}
    - {filename: slot-list.json,        owns: "Stage 3 — per-boundary slot catalogue + canonical_source ratio."}
    - {filename: voter.json,            owns: "Stage 1 — convention voter output."}
    - {filename: match.json,            owns: "Stage 2 — confidence-matrix match + score."}
    - {filename: media-sideload-manifest.json, owns: "Stage 4i — image-sideload manifest."}

# SESSION-START GATE (read FIRST): (0a) ground truth — git log -1 --stat + git status +
# git branch --show-current + `grep -oE 'D[0-9]+' .claude/decisions.md | sort -V | tail -1`
# (the D-ceiling). (0b) follow cold_start_reading_order — ONE active workstream (the
# cloning CSS-transfer rebuild); the theme/Spec-30 thread is COMPLETE (D220).
cold_start_reading_order:
  - 1. .claude/state.md (CLONING block + GROUND-TRUTH-FIRST block)
  - 2. .claude/handoff.md (latest session)
  - 3. .claude/next-session-prompt.md (operative opener — MANDATORY READING gate + STOP catalogue + pre-flight ritual)
  - 4. .claude/specs/31-UNIVERSAL-CLONING-PIPELINE.md — THE BUILD BLUEPRINT, READ IN FULL (§2 core mechanism FIRST, then §3, §12 build-state, §13 binding rules).
  - 5. .claude/plans/2026-07-04-new-engine-to-parity-delete-converter-v2.md (LIVE build plan)
  - 6. .claude/cloning-pipeline-flow.md + .claude/cloning-pipeline-stages.md (as-is pipeline the rebuild maps from)
  - 7. .claude/decisions.md (head — last 5-10; D258 array lift; D229 rebuild decision)
  - 8. .claude/parking.md (last entries) + .claude/specs/common-wp-styling-errors.md (A-R catalogue)
  - 9. pipeline-state/<latest-run>/leftover-buckets.json + extract.json + trace.jsonl (MANDATORY before any converter-quality conjecture)

# Doc length caps (overflow ARCHIVES to memory/<doc>-archive.md, does not delete):
#   state.md / MEMORY.md   <= 24576 bytes
#   next-session-prompt.md <= 200 lines (STOP catalogue carries forward)
#   handoff.md             <= 100 lines per session-section; older sections rotate to memory/
#   CLAUDE.md (root)       target <= 120 lines
#   decisions.md / parking.md / mistakes.md — archive-on-resolve to memory/<doc>-archive.md

retention_rules:
  - {directory: .claude/scratch/, policy: age_out_after_30_days_or_promote_to_reports_if_durable, trigger: handoff_invokes_scratch_prune}
  - {directory: .claude/reports/, policy: forever, note: durable QC / audit / lifecycle reports}
  - {directory: .claude/memory/,  policy: per_doc_type_ttl, note: "archived handoffs (60d) + next-session-prompts (30d) + forever consolidation receipts"}
  - {directory: plans/archive/ + specs/archive/, policy: forever_git_blame_only, note: "ARCHIVED docs — never registered, never referenced from a living doc (Bean 2026-07-02)"}
