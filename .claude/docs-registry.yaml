# docs-registry.yaml — authoritative list of project-tracked docs.
# Walked by /handoff Gate 4.5 on every session close + by autopilot
# session-init for context preload. Keep this list LEAN — only docs
# that are load-bearing for session resume, active reference, or
# append-only history. Absorbed docs / archived plans / non-doc
# artefacts (hooks, secrets) do NOT belong here.
#
# Trim history:
# - 2026-05-21: trimmed 28 → 17 entries (Bean directive). Removed
#   4 absorbed docs (tooling-map.md + skills-commands-map.md +
#   db-tables-map.md + specs/15-...md), 2 historical plans
#   (spec-15-master-execution-plan + phase-7-spec-16-converter-
#   rollout), 2 gitignored secrets files, 4 enforcement hooks
#   (Python, not docs — hook lifecycle ≠ doc lifecycle). Sibling
#   .md version retired same session (yaml is readable as-is).

generated: 2026-05-15
last_trimmed: 2026-05-21
project: small-giants-wp

