# Pipeline run artefacts — the orchestrator writes these per-run; they're the
# diagnostic surface for converter / clone pipeline output. Captured 2026-05-15
# after a session that lost ~6 hours conjecturing about pixel-diff causes
# instead of reading these files. See feedback_read_leftover_buckets_*.md.
pipeline_run_artefacts:
  base_path: "pipeline-state/<client>-<page>-<YYYY-MM-DD-HHMMSS>/"

  - filename: leftover-buckets.json
    doc_type: orchestrator-output
    owns: "Stage 9 gap classification — every converter miss bucketed by (section, slot, reason) into 5 buckets: unrecognised_class, unrecognised_section, extraction_failed, animation_unclassified, structural_mismatch_or_orphan."
    read_when: "Diagnosing converter quality, pixel-diff gaps, or any /sgs-clone output problem. ALWAYS read FIRST before conjecturing about causes."
    writer: plugins/sgs-blocks/scripts/recogniser/leftover-bucket-router.py

  - filename: stage-9.json
    doc_type: orchestrator-output
    owns: "Stage 9 summary — coverage stats, autonomy_chain status, gap_review_report path, unmatched_sections list, operator_review_html_path."
    read_when: "After leftover-buckets.json — for the orchestration-level context around the gaps."

  - filename: extract-result.json
    doc_type: orchestrator-output
    owns: "Stage 4 output — the actual emitted WP block markup + variation_css + extracted_attributes. The bridge between converter and visual-QA."
    read_when: "Verifying converter emitted the expected markup before deploying or running pixel-diff."

  - filename: trace.jsonl
    doc_type: orchestrator-output
    owns: "Per-stage trace events including stage_4_converter_v2 fires + softfails. Use to confirm cv2-eligible routing fired for each boundary."

  - filename: operator-review.html
    doc_type: orchestrator-output
    owns: "Human-readable Stage 9 surface that points the operator at what didn't translate. Open this in a browser for visual review of gaps."

# deprecated_docs section purged 2026-05-14 per Bean — superseded files
# live at their archive paths (.claude/scratch/absorbed/ for specs,
# .claude/plans/archive/ for phase plans). Commit history is the audit
# trail for what got deprecated and when.

enforcement_hooks:
  - path: .claude/hooks/tooling-map-drift-check.py
    status: committed
    enforces: tooling-map.md
    built_on: 2026-05-13

future_hooks:
  - path: .claude/hooks/db-tables-drift-check.py
    enforces: db-tables-map.md
    status: not_built
    notes: "Compare PRAGMA table_info against db-tables-map.md schema columns"

  - path: .claude/hooks/cloning-pipeline-flow-status-check.py
    enforces: cloning-pipeline-flow.md
    status: not_built
    notes: "Parse LIVE-stage status labels; fail if a LIVE-marked module has no import in entry-points. Requires semantic parsing."

  - path: .claude/hooks/role-templates-vs-property-suffixes-check.py
    enforces: drift_between_role-templates.json_and_property_suffixes_DB
    status: not_built
    notes: "Closes drift risk surfaced by P-S15-ROLE-TEMPLATES-MIGRATE in parking.md"

cold_start_reading_order:
  - 1. .claude/state.md
  - 2. .claude/handoff.md
  - 3. .claude/next-session-prompt.md
  - 4. .claude/cloning-pipeline-flow.md (pipeline work) OR .claude/architecture.md (other)
  - 5. .claude/plans/phase-N-*.md (active phase)
  - 6. .claude/decisions.md (last 5-10 entries)
  - 7. .claude/parking.md (last 5 entries)
  - 8. Domain reference: tooling-map.md / skills-commands-map.md / db-tables-map.md / specs/15-*.md
  - 9. .claude/specs/common-wp-styling-errors.md (sections A-R catalogue — check BEFORE filing new "I've seen this" tickets)
  - 10. pipeline-state/<latest-run>/leftover-buckets.json (MANDATORY before any converter-quality conjecture — see feedback_read_leftover_buckets_before_conjecturing.md)

retention_rules:
  - directory: .claude/scratch/
    policy: age_out_after_30_days_or_promote_to_reports_if_durable
    trigger: handoff_invokes_scratch_prune

  - directory: .claude/reports/
    policy: forever
    note: durable QC / audit / lifecycle reports

  - directory: .claude/memory/
    policy: forever
    note: archived handoffs + consolidation receipts; handoff rotates current INTO memory on next session

  - directory: .claude/scratch/absorbed/
    policy: forever
    note: deprecated docs preserved for commit-history continuity
