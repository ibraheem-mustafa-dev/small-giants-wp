[pytest]
# The F5/foundation gate suites live in hyphenated, non-package directories
# (cheat-gate/, excluded-gate/, db-consistency/, coverage-matrix/) that each
# contain same-basename modules (models.py, run.py, tests/__init__.py). Under
# pytest's default "prepend" import mode those collide on sys.modules and a
# combined `pytest scripts/` run errors at collection. importlib mode gives each
# test module a unique fully-qualified name, so the whole tree runs in one go.
addopts = --import-mode=importlib
