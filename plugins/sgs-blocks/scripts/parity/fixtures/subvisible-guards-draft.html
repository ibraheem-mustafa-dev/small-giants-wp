<!doctype html>
<!-- FR-20-3a guard fixture (DRAFT). Three cases the sub-visible predicates must KEEP SCORED
     (never hide) — the code-review bug scenarios (D315):
       1. a MULTI-LINE inline <a> with a different line-height (real leading gap)
       2. a native <button> with a different `appearance` (visible UA-chrome strip)
       3. a flex child where the CLONE ADDS a margin (real extra spacing, not absorbed)
     Draft values: link line-height 24px; button appearance:auto; flex child margin-right 0. -->
<html lang="en"><head><meta charset="utf-8"><title>parity guard fixture</title><style>
  html,body{margin:0;font-family:Arial,sans-serif}
  section{padding:20px}
  .wrap{max-width:220px}
  .lnk{line-height:24px}
  .btn{background:none;border:none;padding:0;font:inherit;appearance:auto;-webkit-appearance:auto}
  .row{display:flex;gap:20px}
  .row span{margin:0}
</style></head><body>
  <section>
    <p class="wrap">Intro copy and then <a href="#" class="lnk">a rather long inline hyperlink that will certainly wrap onto two separate lines within this narrow paragraph</a> trailing words.</p>
    <button class="btn">Proceed to the checkout now</button>
    <div class="row"><span>First flex item label</span><span class="second">Second flex item label</span></div>
  </section>
</body></html>
